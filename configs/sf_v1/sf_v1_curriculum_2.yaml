args:
  checkpoint_activations: true
  eval_batch_size: 1
  eval_interval: 200
  eval_iters: 1
  experiment_name: sf_v1_cur_2
  force_train: true
  load: __LOCAL_CONFIG_TRANSFORMER__
  log_interval: 20
  mode: finetune
  model_parallel_size: 1
  no_load_rng: true
  num_workers: 4
  only_log_video_latents: false
  save: ckpts_5b
  save_interval: 1000
  split: 1,0,0
  train_data:
  - __LOCAL_CONFIG_DATASET_ROOT__/sub-0005_train_va.json
  train_iters: 5000
  valid_data:
  - __LOCAL_CONFIG_DATASET_ROOT__/sub-0005_test_va.json
data:
  params:
    fps: 8
    max_num_frames: 33
    skip_frms_num: 0
    video_size:
    - 480
    - 720
  target: data_video.BrainDataset
deepspeed:
  activation_checkpointing:
    contiguous_memory_optimization: false
    partition_activations: false
  bf16:
    enabled: true
  fp16:
    enabled: false
  gradient_accumulation_steps: 4
  gradient_clipping: 0.1
  hysteresis: 2
  loss_scale: 0
  loss_scale_window: 400
  min_loss_scale: 1
  optimizer:
    params:
      betas:
      - 0.9
      - 0.95
      eps: 1e-8
      lr: 5.0e-05
      weight_decay: 1e-4
    type: Adam
  steps_per_print: 50
  train_micro_batch_size_per_gpu: 1
  wall_clock_breakdown: false
  zero_allow_untested_optimizer: true
  zero_optimization:
    allgather_bucket_size: 1000000000
    contiguous_gradients: false
    cpu_offload: false
    load_from_fp32_weights: false
    overlap_comm: true
    reduce_bucket_size: 1000000000
    reduce_scatter: true
    stage: 2
model:
  freeze_fast_branch: false
  freeze_slow_branch: false
  loss_fn_config:
    params:
      sf_loss_config:
        lambda_aux: 0.5
      training_stage: fusion
