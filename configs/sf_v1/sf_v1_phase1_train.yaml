## Phase 1 Training Config — Stage 1 with all P1 improvements
## Changes vs sf_v1_p1_full_v2.yaml:
##   P1-1: sparse_attn_drop: 0.3 (random sparse mask in temporal decoder)
##   P1-3: flow_codebook_k: 64 (classification instead of regression)
##   P1-4: MoCo queue enabled automatically (queue in sf_embedder, no config needed)
##   Gradient clipping: 1.0 (was 0.1, carry over Stage 3 fix)
args:
  checkpoint_activations: true
  eval_batch_size: 1
  eval_interval: 500
  eval_iters: 1
  experiment_name: sf_v1_phase1
  force_train: true
  load: ckpts_5b/sf_v1_distill_1b_full-04-02-19-00
  log_interval: 20
  mode: finetune
  model_parallel_size: 1
  no_load_rng: true
  num_workers: 2
  only_log_video_latents: true
  save: ckpts_5b
  save_interval: 1000
  split: 1,0,0
  train_data:
  - __LOCAL_CONFIG_DATASET_ROOT__/sub-0005_train_va.json
  train_iters: 3000
  valid_data:
  - __LOCAL_CONFIG_DATASET_ROOT__/sub-0005_test_va.json
data:
  params:
    fps: 8
    max_num_frames: 33
    skip_frms_num: 0
    video_size:
    - 480
    - 720
    sf_target_keys:
    - keyframe_img_emb
    - scene_text_emb
    - flow_token_pca
    - dyn_class_3
    - motion_dir_8
    - ofs_log_zscore
    - temporal_frame_embs
    - flow_mag_traj
  target: data_video.BrainDataset
deepspeed:
  activation_checkpointing:
    contiguous_memory_optimization: false
    partition_activations: false
  bf16:
    enabled: true
  fp16:
    enabled: false
  gradient_accumulation_steps: 2
  gradient_clipping: 1.0
  hysteresis: 2
  loss_scale: 0
  loss_scale_window: 400
  min_loss_scale: 1
  optimizer:
    params:
      betas:
      - 0.9
      - 0.95
      eps: 1e-8
      lr: 0.0001
      weight_decay: 1e-4
    type: Adam
  steps_per_print: 50
  train_micro_batch_size_per_gpu: 1
  wall_clock_breakdown: false
  zero_allow_untested_optimizer: true
  zero_optimization:
    allgather_bucket_size: 1000000000
    contiguous_gradients: false
    cpu_offload: false
    load_from_fp32_weights: false
    overlap_comm: true
    reduce_bucket_size: 1000000000
    reduce_scatter: true
    stage: 2
model:
  freeze_fast_branch: false
  freeze_slow_branch: true
  # P1-1: Sparse causal attention
  sparse_attn_drop: 0.3
  # P1-3: Flow codebook classification (K=64)
  flow_codebook_k: 64
  loss_fn_config:
    params:
      sf_loss_config:
        lambda_distill_cls: 0.5
        lambda_distill_spatial: 0.5
        lambda_temporal_delta: 1.0
        lambda_temporal_abs: 0.2
        lambda_flow_traj: 0.5
        lambda_dyn: 0.1
      training_stage: branch_pretrain
