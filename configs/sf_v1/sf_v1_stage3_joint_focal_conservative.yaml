args:
  checkpoint_activations: true
  eval_batch_size: 1
  eval_interval: 100
  eval_iters: 10
  experiment_name: sf_v1_stage3_joint_focal_conservative
  force_train: true
  load: ckpts_5b/sf_v1_stage3_full_recovery_resume_v3-04-14-19-18
  log_interval: 20
  mode: finetune
  model_parallel_size: 1
  no_load_rng: true
  num_workers: 2
  only_log_video_latents: true
  skip_eval_sampling: true
  save: ckpts_5b
  save_interval: 100
  split: 1,0,0
  train_data:
  - __LOCAL_CONFIG_DATASET_ROOT__/sub-0005_train_va_mini500.json
  train_iters: 300
  valid_data:
  - __LOCAL_CONFIG_DATASET_ROOT__/sub-0005_test_va.json
data:
  params:
    fps: 8
    max_num_frames: 33
    skip_frms_num: 0
    video_size:
    - 480
    - 720
    sf_target_keys:
    - keyframe_img_emb
    - scene_text_emb
    - flow_token_pca
    - dyn_class_3
    - motion_dir_8
    - ofs_log_zscore
    - temporal_frame_embs
    - flow_mag_traj
  target: data_video.BrainDataset
deepspeed:
  activation_checkpointing:
    contiguous_memory_optimization: false
    partition_activations: false
  bf16:
    enabled: true
  fp16:
    enabled: false
  gradient_accumulation_steps: 2
  gradient_clipping: 1.0
  hysteresis: 2
  loss_scale: 0
  loss_scale_window: 400
  min_loss_scale: 1
  optimizer:
    params:
      betas:
      - 0.9
      - 0.95
      eps: 1e-8
      lr: 0.0001
      weight_decay: 1e-4
    type: Adam
  steps_per_print: 50
  train_micro_batch_size_per_gpu: 1
  wall_clock_breakdown: false
  zero_allow_untested_optimizer: true
  zero_optimization:
    allgather_bucket_size: 1000000000
    contiguous_gradients: false
    cpu_offload: false
    load_from_fp32_weights: false
    overlap_comm: true
    reduce_bucket_size: 1000000000
    reduce_scatter: true
    stage: 2
model:
  reset_gate_net: true
  # DiT: LoRA fine-tuning (base weights frozen, only matrix_A/B trainable)
  lora_train: true
  not_trainable_prefixes:
  - all
  # Slow Branch frozen, Fast Branch unfrozen (for L_Struct + causal mask)
  freeze_slow_branch: true
  freeze_fast_branch: false
  unfreeze_fusion: true
  loss_fn_config:
    params:
      training_stage: joint
      lambda_sf: 0.003
      # Router Loss 配置：保守方案（Soft Focal + 温和退火）
      router_loss_type: soft_focal  # 只对难样本施加损失
      router_focal_gamma: 2.0        # 标准 Focal Loss 参数
      router_focal_alpha: 0.25       # 类别平衡
      router_lambda_schedule: cosine_warmup
      router_lambda_start: 0.15      # 更温和的初始权重（vs 0.3）
      router_lambda_end: 0.03        # 更温和的最终权重（vs 0.05）
      router_warmup_iters: 150       # 更短的退火周期（vs 500）
      sf_loss_config:
        lambda_distill_cls: 0.2
        lambda_distill_spatial: 0.2
        lambda_temporal_delta: 1.0
        lambda_temporal_abs: 0.2
        lambda_flow_traj: 0.3
        lambda_dyn: 0.1
        lambda_struct: 0.5
