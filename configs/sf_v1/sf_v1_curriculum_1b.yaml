# Stage 1B: Fast Branch classification only (freeze Slow, disable regression losses)
model:
  loss_fn_config:
    params:
      training_stage: branch_pretrain
      sf_loss_config:
        lambda_mot: 0.0   # disable regression
        lambda_tc: 0.0    # disable regression
  conditioner_config:
    params:
      emb_models:
        - params:
            freeze_slow_branch: true
            freeze_fast_branch: false

args:
  checkpoint_activations: True
  model_parallel_size: 1
  experiment_name: sf_v1_cur_1b
  mode: finetune
  load: __LOCAL_CONFIG_TRANSFORMER__
  no_load_rng: True
  train_iters: 3000
  eval_iters: 1
  eval_interval: 200
  eval_batch_size: 1
  save: ckpts_5b
  save_interval: 1000
  log_interval: 20
  train_data: [ "__LOCAL_CONFIG_DATASET_ROOT__/sub-0005_train_va.json" ]
  valid_data: [ "__LOCAL_CONFIG_DATASET_ROOT__/sub-0005_test_va.json" ]
  split: 1,0,0
  num_workers: 4
  force_train: True
  only_log_video_latents: False

data:
  target: data_video.BrainDataset
  params:
    video_size: [ 480, 720 ]
    fps: 8
    max_num_frames: 33
    skip_frms_num: 0

deepspeed:
  train_micro_batch_size_per_gpu: 1
  gradient_accumulation_steps: 4
  steps_per_print: 50
  gradient_clipping: 0.1
  zero_optimization:
    stage: 2
    cpu_offload: false
    contiguous_gradients: false
    overlap_comm: true
    reduce_scatter: true
    reduce_bucket_size: 1000000000
    allgather_bucket_size: 1000000000
    load_from_fp32_weights: false
  zero_allow_untested_optimizer: true
  bf16:
    enabled: True
  fp16:
    enabled: False
  loss_scale: 0
  loss_scale_window: 400
  hysteresis: 2
  min_loss_scale: 1
  optimizer:
    type: Adam
    params:
      lr: 0.0001
      betas: [ 0.9, 0.95 ]
      eps: 1e-8
      weight_decay: 1e-4
  activation_checkpointing:
    partition_activations: false
    contiguous_memory_optimization: false
  wall_clock_breakdown: false
