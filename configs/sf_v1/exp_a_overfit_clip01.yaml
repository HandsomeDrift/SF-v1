args:
  checkpoint_activations: true
  eval_batch_size: 1
  eval_interval: 9999
  eval_iters: 1
  experiment_name: exp_a_overfit_clip01
  force_train: true
  load: ckpts_5b/sf_v1_mini_cur_1a-04-01-18-26
  log_interval: 10
  mode: finetune
  model_parallel_size: 1
  no_load_rng: true
  num_workers: 1
  only_log_video_latents: false
  save: ckpts_5b
  save_interval: 9999
  split: 1,0,0
  train_data:
  - __LOCAL_CONFIG_DATASET_ROOT__/sub-0005_train_va_1sample.json
  train_iters: 200
  valid_data:
  - __LOCAL_CONFIG_DATASET_ROOT__/sub-0005_test_va_mini50.json
data:
  params:
    fps: 8
    max_num_frames: 33
    skip_frms_num: 0
    video_size:
    - 480
    - 720
  target: data_video.BrainDataset
deepspeed:
  activation_checkpointing:
    contiguous_memory_optimization: false
    partition_activations: false
  bf16:
    enabled: true
  fp16:
    enabled: false
  gradient_accumulation_steps: 1
  gradient_clipping: 0.1
  hysteresis: 2
  loss_scale: 0
  loss_scale_window: 400
  min_loss_scale: 1
  optimizer:
    params:
      betas:
      - 0.9
      - 0.95
      eps: 1e-8
      lr: 0.0001
      weight_decay: 1e-4
    type: Adam
  steps_per_print: 50
  train_micro_batch_size_per_gpu: 1
  wall_clock_breakdown: false
  zero_allow_untested_optimizer: true
  zero_optimization:
    allgather_bucket_size: 1000000000
    contiguous_gradients: false
    cpu_offload: false
    load_from_fp32_weights: false
    overlap_comm: true
    reduce_bucket_size: 1000000000
    reduce_scatter: true
    stage: 2
model:
  freeze_fast_branch: false
  freeze_slow_branch: true
  loss_fn_config:
    params:
      sf_loss_config:
        lambda_mot: 0.0
        lambda_tc: 0.0
      training_stage: branch_pretrain
